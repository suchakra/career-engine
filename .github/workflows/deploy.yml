name: Deploy (manual)

# Push-button deploy: authenticate to Google Cloud keyless (Workload Identity
# Federation — no stored keys), build + push the image, then `terraform apply`.
# State lives in a shared GCS bucket. Trigger from the Actions tab.
#
# Required repository VARIABLES (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT_ID       target project id
#   GCP_WIF_PROVIDER     workloadIdentityPools/…/providers/… resource name
#   GCP_DEPLOY_SA        deployer service account email (impersonated via WIF)
#   TF_STATE_BUCKET      GCS bucket holding Terraform state
#   AR_LOCATION          Artifact Registry region (e.g. us-central1)
#   CE_AUTH_CLIENT_ID    OAuth web client id
#   CE_AUTH_REDIRECT_URI OIDC redirect (public URL + /oauth2callback)
# No secrets are required — WIF is keyless, and secret VALUES live in Secret Manager.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev]
        default: dev

permissions:
  contents: read
  id-token: write # mint the WIF OIDC token

jobs:
  deploy:
    name: build + terraform apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }} # add required reviewers here to gate prod
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build + push image (docker on the runner → Artifact Registry)
        id: build
        run: |
          IMAGE="${{ vars.AR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/career-engine-${{ inputs.environment }}-images/app:${GITHUB_SHA::12}"
          gcloud auth configure-docker "${{ vars.AR_LOCATION }}-docker.pkg.dev" --quiet
          # Retry to ride out transient registry/network flakes (Docker Hub 5xx,
          # Artifact Registry 502 on manifest push). Build is cached across retries.
          n=0
          until docker build -t "$IMAGE" . && docker push "$IMAGE"; do
            n=$((n + 1))
            if [ "$n" -ge 4 ]; then echo "build/push failed after $n attempts"; exit 1; fi
            echo "attempt $n failed (transient?) — retrying in 20s…"; sleep 20
          done
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init + apply
        working-directory: infrastructure/envs/${{ inputs.environment }}
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_image: ${{ steps.build.outputs.image }}
          TF_VAR_auth_client_id: ${{ vars.CE_AUTH_CLIENT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CF_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CF_ZONE_ID }}
          # custom_domain default (career-engine.bitcrafty.cloud) is used unless overridden.
          # auth_redirect_uri is derived from custom_domain; override via TF_VAR_auth_redirect_uri if needed.
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=envs/${{ inputs.environment }}"
          terraform apply -auto-approve -input=false

      - name: Service URL
        working-directory: infrastructure/envs/${{ inputs.environment }}
        run: |
          echo "Deployed: $(terraform output -raw service_uri)" >> "$GITHUB_STEP_SUMMARY"
