name: Deploy (manual)

# Push-button deploy: authenticate to Google Cloud keyless (Workload Identity
# Federation — no stored keys), build + push the image, then `terraform apply`.
# State lives in a shared GCS bucket. Trigger from the Actions tab.
#
# ⚠️ TENET: dev is Kaggle-visible and MUST NOT break. `qa` is the pre-dev preview and is
# the DEFAULT target. Deploying `dev` cuts it over to the new Next.js+FastAPI stack and
# requires the explicit `confirm_dev_cutover: true` input — otherwise the run fails fast.
#
# Required repository VARIABLES (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT_ID       target project id (qa is the SAME project as dev)
#   GCP_WIF_PROVIDER     workloadIdentityPools/…/providers/… resource name
#   GCP_DEPLOY_SA        deployer service account email (impersonated via WIF)
#   TF_STATE_BUCKET      GCS bucket holding Terraform state (qa uses prefix envs/qa)
#   AR_LOCATION          Artifact Registry region (e.g. us-central1)
#   NEXT_PUBLIC_FIREBASE_API_KEY / _AUTH_DOMAIN / _PROJECT_ID  Firebase web config (PUBLIC,
#                        baked into the frontend at build time; needed for Google sign-in)
#   CE_AUTH_CLIENT_ID    (dev/Streamlit only — passed as TF_VAR_auth_client_id; ignored by qa)
# The dev OAuth redirect URI is hard-coded below (not a Variable); qa ignores it.
# No secrets required — WIF is keyless; BYOK key VALUES live in Secret Manager.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (qa = pre-dev preview; dev = Kaggle-visible)
        type: choice
        options: [qa, dev]
        default: qa
      confirm_dev_cutover:
        description: "Type-check: must be true to deploy dev (cuts dev over to the new stack)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # mint the WIF OIDC token

jobs:
  deploy:
    name: build + terraform apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }} # add required reviewers here to gate prod
    steps:
      # TENET GUARD: refuse to touch the Kaggle-visible dev service unless explicitly confirmed.
      - name: Guard dev cutover
        if: ${{ inputs.environment == 'dev' && inputs.confirm_dev_cutover != true }}
        run: |
          echo "::error::Refusing to deploy dev without confirm_dev_cutover=true (dev is Kaggle-visible)." >&2
          exit 1

      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build + push image (docker on the runner → Artifact Registry)
        id: build
        run: |
          # Same-project qa REUSES dev's Artifact Registry repo (career-engine-dev-images);
          # images are tagged per-env so dev and qa never collide.
          IMAGE="${{ vars.AR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/career-engine-dev-images/app:${{ inputs.environment }}-${GITHUB_SHA::12}"
          gcloud auth configure-docker "${{ vars.AR_LOCATION }}-docker.pkg.dev" --quiet
          # NEXT_PUBLIC_* are baked into the static export AT BUILD TIME (output: export).
          # API base is empty → same-origin (client calls /api/...). Firebase web config is
          # PUBLIC and required for Google sign-in to initialise.
          n=0
          until docker build \
                  --build-arg NEXT_PUBLIC_API_BASE_URL="" \
                  --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
                  --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
                  --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
                  -t "$IMAGE" . && docker push "$IMAGE"; do
            n=$((n + 1))
            if [ "$n" -ge 4 ]; then echo "build/push failed after $n attempts"; exit 1; fi
            echo "attempt $n failed (transient?) — retrying in 20s…"; sleep 20
          done
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init + apply
        working-directory: infrastructure/envs/${{ inputs.environment }}
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_image: ${{ steps.build.outputs.image }}
          # dev/Streamlit-only vars — the qa root does not declare these, so TF_VAR_* for
          # them is silently ignored there (harmless).
          TF_VAR_auth_client_id: ${{ vars.CE_AUTH_CLIENT_ID }}
          TF_VAR_auth_redirect_uri: "https://career-engine-dev-app-ontyg6kaja-uc.a.run.app/oauth2callback"
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=envs/${{ inputs.environment }}"
          terraform apply -auto-approve -input=false

      - name: Service URL
        working-directory: infrastructure/envs/${{ inputs.environment }}
        run: |
          echo "Deployed: $(terraform output -raw service_uri)" >> "$GITHUB_STEP_SUMMARY"
