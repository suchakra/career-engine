name: CI

# Two gateable checks, no cloud credentials required — the same gates a
# contributor runs locally (`make check`, `make tf-check`). Runs on every push to
# master and on every pull request.
on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint · Types · Tests (make check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # WeasyPrint (PDF renderer) needs Pango at import time; the end-to-end test
      # renders a real PDF, so install the native libraries. This is the set the
      # WeasyPrint 69 docs list for Debian/Ubuntu (Pango pulls HarfBuzz + fontconfig
      # transitively); CI is verified green with exactly these.
      - name: Install WeasyPrint system libraries
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install project (dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: make check (ruff + mypy --strict + pytest)
        run: make check

  tf-check:
    name: Terraform fmt + validate (make tf-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      # fmt + validate for both env roots — no GCP credentials required.
      - name: make tf-check
        run: make tf-check

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validate the Dockerfile builds (no push, no registry/credentials needed).
      - name: docker build
        run: docker build -t career-engine:ci .
